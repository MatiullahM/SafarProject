components:
  schemas:
    AccountStatusEnum:
      enum:
      - active
      type: string
      description: '* `active` - Active'
    Activation:
      type: object
      properties:
        uid:
          type: string
        token:
          type: string
      required:
      - token
      - uid
    PasswordResetConfirm:
      type: object
      properties:
        uid:
          type: string
        token:
          type: string
        new_password:
          type: string
      required:
      - new_password
      - token
      - uid
    PatchedProvinces:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 150
        code:
          type: string
          nullable: true
          maxLength: 5
        created_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
    PatchedTerminals:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 150
        owner:
          type: string
          nullable: true
          maxLength: 100
        address:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        province:
          type: integer
          nullable: true
    PatchedUser:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        first_name:
          type: string
          maxLength: 100
        last_name:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          writeOnly: true
        phone_number:
          type: string
          nullable: true
          maxLength: 15
        province:
          type: integer
          nullable: true
        terminal:
          type: integer
          nullable: true
        account_status:
          $ref: '#/components/schemas/AccountStatusEnum'
        last_login:
